{% extends "base.html" %}
{% block title %}Sign In - DUT Lost & Found{% endblock %}

{% block content %}
<h2>Sign In</h2>
<p>DUT Lost & Found Portal</p>

<form method="POST" action="{% if request.args.get('next') %}{{ url_for('auth.login', next=request.args.get('next')) }}{% else %}{{ url_for('auth.login') }}{% endif %}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <label>DUT Email Address</label>
    <input type="email" name="email" value="{{ email }}" required>

    <label>Password</label>
    <input type="password" name="password" required>

    <div>
        <input type="checkbox" name="remember_me" id="remember_me">
        <label for="remember_me">Keep me signed in</label>
    </div>

    <button type="submit">Sign In</button>
</form>

<hr>
<p>Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a></p>
{% endblock %}
